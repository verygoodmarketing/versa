<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 720" width="480" height="720" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <filter id="phoneshadow">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="rgba(79,70,229,0.22)"/>
    </filter>
    <filter id="imgshadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="rgba(0,0,0,0.10)"/>
    </filter>
    <clipPath id="screenclip">
      <rect x="62" y="72" width="356" height="576" rx="4"/>
    </clipPath>
    <linearGradient id="heroGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#F5F5FA"/>
    </linearGradient>
  </defs>

  <!-- Page background -->
  <rect width="480" height="720" fill="url(#bgGrad)"/>

  <!-- PHONE BODY  -->
  <!-- Outer phone shell -->
  <rect x="42" y="30" width="396" height="660" rx="50" fill="#1C1C1E" filter="url(#phoneshadow)"/>
  <!-- Phone inner bezel -->
  <rect x="50" y="38" width="380" height="644" rx="44" fill="#2C2C2E"/>
  <!-- Screen area -->
  <rect x="62" y="72" width="356" height="576" rx="8" fill="white"/>

  <!-- Side buttons (left) -->
  <rect x="38" y="180" width="6" height="40" rx="3" fill="#3A3A3C"/>
  <rect x="38" y="232" width="6" height="60" rx="3" fill="#3A3A3C"/>
  <rect x="38" y="304" width="6" height="60" rx="3" fill="#3A3A3C"/>
  <!-- Power button (right) -->
  <rect x="436" y="220" width="6" height="80" rx="3" fill="#3A3A3C"/>

  <!-- Notch / dynamic island -->
  <rect x="170" y="52" width="140" height="28" rx="14" fill="#1C1C1E"/>
  <!-- Front camera dot inside notch -->
  <circle cx="290" cy="66" r="5" fill="#2C2C2E"/>

  <!-- Home indicator -->
  <rect x="185" y="626" width="110" height="5" rx="2.5" fill="#3A3A3C"/>

  <!-- WEBSITE CONTENT (inside screen clip)  -->
  <g clip-path="url(#screenclip)">

    <!-- NAV BAR  -->
    <rect x="62" y="72" width="356" height="52" fill="white"/>
    <!-- Logo -->
    <rect x="78" y="86" width="22" height="22" rx="5" fill="#4F46E5"/>
    <text x="89" y="102" font-size="11" font-weight="bold" fill="white" text-anchor="middle">R</text>
    <text x="108" y="102" font-size="13" font-weight="700" fill="#111827">Rivera Plumbing</text>
    <!-- Call button in nav -->
    <rect x="334" y="86" width="70" height="26" rx="6" fill="#4F46E5"/>
    <text x="369" y="104" font-size="11" font-weight="600" fill="white" text-anchor="middle">📞 Call</text>

    <!-- Nav underline -->
    <line x1="62" y1="124" x2="418" y2="124" stroke="#E5E7EB" stroke-width="1"/>

    <!-- HERO SECTION  -->
    <rect x="62" y="124" width="356" height="220" fill="url(#heroGrad)"/>

    <!-- Hero pattern overlay (subtle dots) -->
    <circle cx="100" cy="150" r="80" fill="white" opacity="0.03"/>
    <circle cx="380" cy="280" r="100" fill="#4F46E5" opacity="0.15"/>

    <!-- Hero badge -->
    <rect x="130" y="142" width="220" height="22" rx="11" fill="rgba(255,255,255,0.12)"/>
    <circle cx="144" cy="153" r="4" fill="#22C55E"/>
    <text x="240" y="158" font-size="10" fill="#A5B4FC" text-anchor="middle" font-weight="500">&#x2605;&#x2605;&#x2605;&#x2605;&#x2605; Rated #1 Plumber in Austin</text>

    <!-- Hero headline -->
    <text x="240" y="196" font-size="24" font-weight="700" fill="white" text-anchor="middle">Fast, Reliable</text>
    <text x="240" y="224" font-size="24" font-weight="700" fill="#A5B4FC" text-anchor="middle">Plumbing Service</text>

    <!-- Subtext -->
    <text x="240" y="254" font-size="12" fill="#C7D2FE" text-anchor="middle">Licensed &amp; insured. Same-day service.</text>
    <text x="240" y="270" font-size="12" fill="#C7D2FE" text-anchor="middle">Austin, TX and surrounding areas.</text>

    <!-- Big CTA button -->
    <rect x="90" y="288" width="260" height="48" rx="10" fill="#4F46E5"/>
    <!-- Glow under button -->
    <rect x="100" y="330" width="240" height="8" rx="4" fill="#4F46E5" opacity="0.3"/>
    <text x="220" y="319" font-size="14" font-weight="700" fill="white" text-anchor="middle">📞 Call (555) 234-7890</text>

    <!-- TRUST BAR  -->
    <rect x="62" y="344" width="356" height="48" fill="#F9FAFB"/>
    <line x1="62" y1="344" x2="418" y2="344" stroke="#E5E7EB" stroke-width="1"/>
    <line x1="62" y1="392" x2="418" y2="392" stroke="#E5E7EB" stroke-width="1"/>

    <!-- Trust items -->
    <text x="115" y="374" font-size="10" fill="#374151" text-anchor="middle">✅ Licensed</text>
    <line x1="168" y1="354" x2="168" y2="382" stroke="#E5E7EB" stroke-width="1"/>
    <text x="215" y="374" font-size="10" fill="#374151" text-anchor="middle">⏱ Same Day</text>
    <line x1="262" y1="354" x2="262" y2="382" stroke="#E5E7EB" stroke-width="1"/>
    <text x="311" y="374" font-size="10" fill="#374151" text-anchor="middle">🏅 5-Star Rated</text>
    <line x1="360" y1="354" x2="360" y2="382" stroke="#E5E7EB" stroke-width="1"/>
    <text x="392" y="374" font-size="10" fill="#374151" text-anchor="middle">🔒 Insured</text>

    <!-- SERVICES SECTION  -->
    <rect x="62" y="392" width="356" height="200" fill="white"/>
    <text x="240" y="422" font-size="15" font-weight="700" fill="#111827" text-anchor="middle">Our Services</text>

    <!-- Service cards - 2x2 grid -->
    <!-- Card 1 -->
    <rect x="78" y="434" width="156" height="68" rx="10" fill="#F8F8FC" stroke="#E5E7EB" stroke-width="1"/>
    <text x="100" y="460" font-size="20">🔧</text>
    <text x="132" y="458" font-size="12" font-weight="600" fill="#111827">Pipe Repair</text>
    <text x="132" y="474" font-size="10" fill="#6B7280">Leaks, bursts,</text>
    <text x="132" y="488" font-size="10" fill="#6B7280">pipe replacement</text>

    <!-- Card 2 -->
    <rect x="246" y="434" width="156" height="68" rx="10" fill="#F8F8FC" stroke="#E5E7EB" stroke-width="1"/>
    <text x="268" y="460" font-size="20">🚿</text>
    <text x="300" y="458" font-size="12" font-weight="600" fill="#111827">Drain Clean</text>
    <text x="300" y="474" font-size="10" fill="#6B7280">Clogs, slow</text>
    <text x="300" y="488" font-size="10" fill="#6B7280">drains cleared</text>

    <!-- Card 3 -->
    <rect x="78" y="512" width="156" height="68" rx="10" fill="#F8F8FC" stroke="#E5E7EB" stroke-width="1"/>
    <text x="100" y="538" font-size="20">🌡️</text>
    <text x="132" y="536" font-size="12" font-weight="600" fill="#111827">Water Heater</text>
    <text x="132" y="552" font-size="10" fill="#6B7280">Install, repair,</text>
    <text x="132" y="566" font-size="10" fill="#6B7280">replacement</text>

    <!-- Card 4 -->
    <rect x="246" y="512" width="156" height="68" rx="10" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1"/>
    <text x="268" y="538" font-size="20">🚨</text>
    <text x="300" y="536" font-size="12" font-weight="600" fill="#4F46E5">Emergency</text>
    <text x="300" y="552" font-size="10" fill="#4F46E5">24/7 service</text>
    <text x="300" y="566" font-size="10" fill="#4F46E5">available now</text>

    <!-- REVIEWS SNIPPET  -->
    <rect x="62" y="592" width="356" height="56" fill="#FFFBEB"/>
    <line x1="62" y1="592" x2="418" y2="592" stroke="#FCD34D" stroke-width="1"/>
    <text x="240" y="614" font-size="13" fill="#92400E" text-anchor="middle" font-weight="600">&#x2605;&#x2605;&#x2605;&#x2605;&#x2605; &#x201C;Came same day, fixed in an hour.&#x201D;</text>
    <text x="240" y="634" font-size="11" fill="#A16207" text-anchor="middle">&#x2014; Maria T., Austin TX &#xB7; 47 reviews on Google</text>

  </g>

  <!-- LABEL BELOW PHONE  -->
  <text x="240" y="706" font-size="13" font-weight="700" fill="#374151" text-anchor="middle">Mobile website — live in under an hour</text>
  <text x="240" y="722" font-size="11" fill="#9CA3AF" text-anchor="middle">rivieraplumbing.versalocal.com</text>

</svg>
