<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 400" width="920" height="400" font-family="'Montserrat', Arial, sans-serif">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="rgba(0,0,0,0.12)"/>
    </filter>
    <filter id="shadowActive">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="rgba(79,70,229,0.20)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="920" height="400" fill="#F5F5FA"/>

  <!-- ===== CONNECTOR ARROWS between steps ===== -->
  <!-- Arrow 1 -->
  <line x1="295" y1="200" x2="330" y2="200" stroke="#FDE68A" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="330,195 340,200 330,205" fill="#FCD34D"/>
  <!-- Arrow 2 -->
  <line x1="615" y1="200" x2="650" y2="200" stroke="#FDE68A" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="650,195 660,200 650,205" fill="#FCD34D"/>

  <!-- ===== STEP 1: Business Name ===== -->
  <rect x="30" y="60" width="265" height="280" rx="16" fill="white" filter="url(#shadow)"/>

  <!-- Step pill -->
  <rect x="100" y="80" width="125" height="24" rx="12" fill="#FEF3C7"/>
  <text x="162" y="97" font-size="11" fill="#D97706" font-weight="700" text-anchor="middle">Step 1 of 3</text>

  <!-- Progress bar -->
  <rect x="50" y="112" width="225" height="4" rx="2" fill="#E5E7EB"/>
  <rect x="50" y="112" width="75" height="4" rx="2" fill="#D97706"/>

  <!-- Heading -->
  <text x="162" y="148" font-size="17" font-weight="700" fill="#111827" text-anchor="middle">What's your</text>
  <text x="162" y="168" font-size="17" font-weight="700" fill="#111827" text-anchor="middle">business name?</text>

  <!-- Input field -->
  <rect x="50" y="184" width="225" height="44" rx="8" fill="white" stroke="#D97706" stroke-width="2"/>
  <text x="65" y="211" font-size="13" fill="#111827">Rivera Plumbing</text>
  <!-- Cursor blink -->
  <line x1="181" y1="194" x2="181" y2="214" stroke="#D97706" stroke-width="1.5"/>

  <!-- Helper text -->
  <text x="162" y="248" font-size="11" fill="#9CA3AF" text-anchor="middle">This will appear on your website</text>
  <text x="162" y="262" font-size="11" fill="#9CA3AF" text-anchor="middle">and Google listing</text>

  <!-- CTA button -->
  <rect x="50" y="278" width="225" height="44" rx="8" fill="#D97706"/>
  <text x="162" y="305" font-size="14" font-weight="600" fill="white" text-anchor="middle">Continue →</text>

  <!-- Step label -->
  <text x="162" y="366" font-size="12" fill="#6B7280" text-anchor="middle" font-weight="600">Enter business name</text>
  <text x="162" y="382" font-size="11" fill="#9CA3AF" text-anchor="middle">takes 10 seconds</text>


  <!-- ===== STEP 2: Trade Selection ===== -->
  <rect x="350" y="60" width="265" height="280" rx="16" fill="white" filter="url(#shadowActive)" stroke="#D97706" stroke-width="2"/>

  <!-- Step pill -->
  <rect x="420" y="80" width="125" height="24" rx="12" fill="#D97706"/>
  <text x="482" y="97" font-size="11" fill="white" font-weight="700" text-anchor="middle">Step 2 of 3</text>

  <!-- Progress bar -->
  <rect x="370" y="112" width="225" height="4" rx="2" fill="#E5E7EB"/>
  <rect x="370" y="112" width="150" height="4" rx="2" fill="#D97706"/>

  <!-- Heading -->
  <text x="482" y="148" font-size="17" font-weight="700" fill="#111827" text-anchor="middle">What type of</text>
  <text x="482" y="168" font-size="17" font-weight="700" fill="#111827" text-anchor="middle">work do you do?</text>

  <!-- Trade options - 2x3 grid -->
  <!-- Row 1 -->
  <rect x="370" y="182" width="100" height="52" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
  <text x="420" y="205" font-size="18" text-anchor="middle">🔧</text>
  <text x="420" y="225" font-size="11" fill="#D97706" font-weight="600" text-anchor="middle">Plumbing</text>

  <rect x="482" y="182" width="100" height="52" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="532" y="205" font-size="18" text-anchor="middle">⚡</text>
  <text x="532" y="225" font-size="11" fill="#374151" text-anchor="middle">Electric</text>

  <!-- Row 2 -->
  <rect x="370" y="244" width="100" height="52" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="420" y="267" font-size="18" text-anchor="middle">🌿</text>
  <text x="420" y="287" font-size="11" fill="#374151" text-anchor="middle">Landscaping</text>

  <rect x="482" y="244" width="100" height="52" rx="8" fill="white" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="532" y="267" font-size="18" text-anchor="middle">🏠</text>
  <text x="532" y="287" font-size="11" fill="#374151" text-anchor="middle">Cleaning</text>

  <!-- Step label -->
  <text x="482" y="366" font-size="12" fill="#D97706" text-anchor="middle" font-weight="700">← You are here</text>
  <text x="482" y="382" font-size="11" fill="#9CA3AF" text-anchor="middle">pick your trade</text>


  <!-- ===== STEP 3: Live Website ===== -->
  <rect x="670" y="60" width="220" height="280" rx="16" fill="white" filter="url(#shadow)"/>

  <!-- Step pill -->
  <rect x="727" y="80" width="125" height="24" rx="12" fill="#DCFCE7"/>
  <text x="789" y="97" font-size="11" fill="#166534" font-weight="700" text-anchor="middle">✓ You're live!</text>

  <!-- Progress bar - full -->
  <rect x="690" y="112" width="180" height="4" rx="2" fill="#D97706"/>

  <!-- Heading -->
  <text x="780" y="148" font-size="17" font-weight="700" fill="#111827" text-anchor="middle">Your website</text>
  <text x="780" y="168" font-size="17" font-weight="700" fill="#D97706" text-anchor="middle">is live! 🎉</text>

  <!-- Mini website preview inside the card -->
  <rect x="690" y="180" width="180" height="110" rx="8" fill="#F8F8FC" stroke="#E5E7EB" stroke-width="1"/>
  <!-- Mini browser bar -->
  <rect x="690" y="180" width="180" height="20" rx="8" fill="#F3F4F6"/>
  <rect x="690" y="190" width="180" height="10" fill="#F3F4F6"/>
  <circle cx="702" cy="190" r="4" fill="#FF5F56"/>
  <circle cx="714" cy="190" r="4" fill="#FFBD2E"/>
  <circle cx="726" cy="190" r="4" fill="#27C93F"/>
  <!-- Mini URL bar -->
  <rect x="740" y="183" width="118" height="14" rx="3" fill="#E5E7EB"/>
  <text x="799" y="194" font-size="7" fill="#6B7280" text-anchor="middle">rivieraplumbing.groundworklocal.com</text>

  <!-- Mini website hero content -->
  <rect x="700" y="202" width="160" height="8" rx="3" fill="#D97706" opacity="0.8"/>
  <rect x="712" y="214" width="136" height="5" rx="2" fill="#D1D5DB"/>
  <rect x="720" y="222" width="120" height="5" rx="2" fill="#D1D5DB"/>
  <!-- Mini CTA button -->
  <rect x="720" y="232" width="80" height="18" rx="5" fill="#D97706"/>
  <text x="760" y="245" font-size="7" fill="white" text-anchor="middle" font-weight="600">Call Now</text>
  <!-- Phone number hint -->
  <text x="780" y="278" font-size="8" fill="#6B7280" text-anchor="middle">(555) 234-7890</text>

  <!-- URL display -->
  <text x="780" y="312" font-size="10" fill="#D97706" text-anchor="middle" font-weight="500">rivieraplumbing.groundworklocal.com</text>

  <!-- Step label -->
  <text x="780" y="366" font-size="12" fill="#6B7280" text-anchor="middle" font-weight="600">Website goes live instantly</text>
  <text x="780" y="382" font-size="11" fill="#9CA3AF" text-anchor="middle">total time: ~20 minutes</text>

  <!-- ===== HEADLINE ABOVE ===== -->
  <text x="460" y="44" font-size="14" fill="#D97706" font-weight="700" text-anchor="middle">UP AND RUNNING IN 3 SIMPLE STEPS</text>

</svg>
