  <rect x="20" y="44" width="860" height="20" fill="#F9FAFB"/>
  
  <!-- Traffic lights -->
  <circle cx="52" cy="42" r="7" fill="#FF5F56"/>
  <circle cx="74" cy="42" r="7" fill="#FFBD2E"/>
  <circle cx="96" cy="42" r="7" fill="#27C93F"/>
  
