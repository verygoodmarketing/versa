name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          # VERCEL_ORG_ID = team_wfvPuAOvYcBXvGumlMRtY9iQ (very-good-marketing team)
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          # VERCEL_PROJECT_ID = prj_A6ZfsCilCtUYf76ehT9YxI76SGec (groundwork project)
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
          working-directory: ./

      # Run DB migrations after successful deploy
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        if: hashFiles('prisma/migrations/**/*.sql') != ''
        run: |
          if [ -z "$DATABASE_URL" ] || [ -z "$DIRECT_URL" ]; then
            echo "::warning::DATABASE_URL or DIRECT_URL secret is not configured — skipping migrations."
            echo "Add DATABASE_URL and DIRECT_URL to GitHub repository secrets to enable automatic migrations."
            exit 0
          fi
          npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

