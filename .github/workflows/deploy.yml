name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v42.2.0
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          # VERCEL_ORG_ID = team_wfvPuAOvYcBXvGumlMRtY9iQ (very-good-marketing team)
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          # VERCEL_PROJECT_ID = prj_A6ZfsCilCtUYf76ehT9YxI76SGec (groundwork project)
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
          working-directory: ./

      # Run DB migrations after successful deploy
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        if: hashFiles('prisma/migrations/**/*.sql') != ''
        run: |
          if [ -z "$DATABASE_URL" ] || [ -z "$DIRECT_URL" ]; then
            echo "::warning::DATABASE_URL or DIRECT_URL secret is not configured — skipping migrations."
            echo "Add DATABASE_URL and DIRECT_URL to GitHub repository secrets to enable automatic migrations."
            exit 0
          fi
          # Detect and resolve any previously-failed migrations (Prisma P3009).
          # prisma migrate deploy refuses to proceed if a migration is in "failed"
          # state in the _prisma_migrations table. Running with || true so that
          # on future deploys (when no migrations are stuck) this exits cleanly.
          DEPLOY_OUTPUT=$(npx prisma migrate deploy 2>&1) || true
          DEPLOY_EXIT=$?
          echo "$DEPLOY_OUTPUT"
          if [ $DEPLOY_EXIT -ne 0 ]; then
            # Check if this is a P3009 "failed migration" error and resolve it.
            # Extract migration name from: The `<name>` migration ... failed
            FAILED_MIGRATION=$(echo "$DEPLOY_OUTPUT" | sed -n "s/.*The \`\([^\`]*\)\` migration.*/\1/p" | head -1)
            if [ -n "$FAILED_MIGRATION" ]; then
              echo "::warning::Resolving previously-failed migration: $FAILED_MIGRATION"
              npx prisma migrate resolve --rolled-back "$FAILED_MIGRATION"
              # Retry deploy after resolving the stuck migration
              npx prisma migrate deploy
            else
              exit $DEPLOY_EXIT
            fi
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

